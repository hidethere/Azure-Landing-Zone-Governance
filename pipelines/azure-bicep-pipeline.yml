stages:
- stage: GenerateSSH
  jobs:
  - job: SSH
    steps:
    - task: PowerShell@2
      inputs:
        targetType: inline
        script: |
          $sshDir = "$(Pipeline.Workspace)/ssh"
          New-Item -ItemType Directory -Force -Path $sshDir

          ssh-keygen -t rsa -b 4096 -f "$sshDir/id_rsa" -N ""

          $publicKey  = Get-Content "$sshDir/id_rsa.pub" -Raw
          $privateKey = Get-Content "$sshDir/id_rsa" -Raw

          az keyvault secret set `
            --vault-name "$(keyVaultName)" `
            --name "ssh-private-key" `
            --value "$privateKey"
          
          az keyvault secret set `
            --vault-name "$(keyVaultName)" `
            --name "ssh-public-key" `
            --value "$publicKey"

          Write-Host "##vso[task.setvariable variable=sshPublicKey]$publicKey"

- stage: DeployInfra
  dependsOn: GenerateSSH
  jobs:
  - job: Deploy
    steps:
    - task: AzureCLI@2
      inputs:
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az deployment sub create `
            --location northeurope `
            --template-file main.bicep `
            --parameters @main.parameters.json
            --parameters sshPublicKey="$(sshPublicKey)"
         